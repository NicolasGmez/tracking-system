<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Domiciliario Kondorito</title>

  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <link rel="stylesheet" href="/pwa/styles.css">
</head>

<body>

<div class="app">

  <!-- 🔝 HEADER -->
  <div class="header">
    <div>🛵 Kondorito</div>
    <div>ID: <span id="domId">---</span></div>
  </div>

  <!-- 🧁 PEDIDO -->
  <div class="pedido-bar" id="pedidoTexto">
    🧁 Sin pedido...
  </div>

  <!-- 🗺️ MAPA -->
  <div class="map-container">
    <div id="map"></div>
    <div class="map-btn" onclick="toggleMap()">⛶</div>
  </div>

  <!-- 📍 ACCIONES -->
  <div class="accion-card">

    <div class="direccion" id="direccionTexto">
      📍 Dirección destino...
    </div>

    <div class="swipe-container">
      <div class="swipe-text">Desliza para entregar</div>
      <div class="swipe-btn" id="swipeBtn">➤</div>
    </div>

  </div>

  <!-- 🚚 FOOTER -->
  <div class="estado-footer">
    <div id="estado">🚚 En espera</div>
    <div id="conexionEstado">🔴 Desconectado</div>
  </div>

</div>

<script>
let isFullscreen = false;

function toggleMap(){
  const container = document.querySelector(".map-container");

  isFullscreen = !isFullscreen;

  container.classList.toggle("fullscreen");

  setTimeout(() => {
    window.dispatchEvent(new Event("resize"));
  }, 300);
}
</script>

<script src="app.js"></script>

</body>
</html>
